<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f7f2e8" />
  <title>VM 2026 • Kampcenter</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="app.css" />
  <script src="config.js" defer></script>
  <script src="app.js" defer></script>
</head>
<body>
  <div id="installBar" class="install-bar" hidden>
    <span>Installér VM-appen på telefonen</span>
    <button id="installBtn" type="button">Installér</button>
    <button id="dismissInstall" type="button" aria-label="Luk">×</button>
  </div>

  <div class="app-shell">
    <aside class="sidebar" aria-label="Hovedmenu">
      <a class="brand" href="#/overview" aria-label="VM 2026 forside">
        <span class="brand-cup" aria-hidden="true">🏆</span>
        <span><strong>WORLD<br>CUP</strong><small>2026</small></span>
      </a>
      <nav id="desktopNav" class="nav-list"></nav>
      <div class="side-foot">
        <span>Data leveret af</span>
        <strong>KickoffAPI</strong>
      </div>
    </aside>

    <main class="content">
      <header class="topbar">
        <button id="backBtn" class="icon-btn" type="button" aria-label="Tilbage" hidden>←</button>
        <div>
          <p id="eyebrow" class="eyebrow">VM 2026</p>
          <h1 id="pageTitle">Oversigt</h1>
        </div>
        <div class="top-actions">
          <button id="demoToggle" class="ghost-btn" type="button">Demo</button>
          <button id="refreshBtn" class="primary-btn" type="button">Opdatér</button>
        </div>
      </header>

      <section id="notice" class="notice" hidden></section>
      <section id="app" class="view" aria-live="polite"></section>
    </main>
  </div>

  <nav id="mobileNav" class="mobile-nav" aria-label="Mobilmenu"></nav>
</body>
</html>
